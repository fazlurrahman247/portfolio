<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Portfolio Manager</title>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/responsive.css" />
    <style>
      .admin-container {
        max-width: 900px;
        margin: 120px auto 50px;
        padding: 2rem;
      }
      .admin-header {
        text-align: center;
        margin-bottom: 3rem;
      }
      .admin-header h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
      }
      .admin-header p {
        color: var(--text-secondary);
      }
      .admin-form {
        background: var(--bg-card);
        padding: 2.5rem;
        border-radius: 1.2rem;
        border: 1px solid var(--border-color);
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-primary);
        font-weight: 500;
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 1rem;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-primary);
        font-family: "Poppins", sans-serif;
        font-size: 1rem;
      }
      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--accent-primary);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }
      .btn-group {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
      }
      .btn-admin {
        padding: 1rem 2rem;
        border-radius: 50px;
        font-family: "Poppins", sans-serif;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        border: none;
      }
      .btn-primary-admin {
        background: var(--accent-gradient);
        color: white;
      }
      .btn-secondary-admin {
        background: var(--glass-bg);
        color: var(--text-primary);
        border: 1px solid var(--glass-border);
      }
      .btn-admin:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px var(--accent-glow);
      }
      .preview-section {
        margin-top: 3rem;
      }
      .preview-section h3 {
        margin-bottom: 1.5rem;
      }
      .portfolio-preview {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
      }
      .portfolio-preview .portfolio {
        margin-bottom: 0;
      }
      .json-output {
        margin-top: 2rem;
        background: var(--bg-secondary);
        padding: 1.5rem;
        border-radius: 8px;
        border: 1px solid var(--border-color);
      }
      .json-output textarea {
        width: 100%;
        min-height: 200px;
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1rem;
        color: var(--accent-primary);
        font-family: monospace;
        font-size: 0.9rem;
      }
      .notification {
        position: fixed;
        top: 100px;
        right: 20px;
        padding: 1rem 2rem;
        background: var(--accent-gradient);
        color: white;
        border-radius: 8px;
        font-weight: 500;
        transform: translateX(400px);
        transition: transform 0.3s ease;
        z-index: 1001;
      }
      .notification.show {
        transform: translateX(0);
      }
      .delete-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 30px;
        height: 30px;
        background: #ef4444;
        border: none;
        border-radius: 50%;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
      }
      .portfolio-item {
        position: relative;
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav main-container">
        <div class="logo">
          <a href="index.html">Fazlur<span>Rahman</span></a>
        </div>
        <ul id="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="admin.html">Admin Panel</a></li>
        </ul>
      </div>
    </nav>

    <div class="admin-container">
      <div class="admin-header">
        <h1>Portfolio Admin Panel</h1>
        <p>Tambah atau manage project portfolio kamu</p>
      </div>

      <div class="admin-form">
        <form id="portfolioForm">
          <div class="form-row">
            <div class="form-group">
              <label>Project Title</label>
              <input
                type="text"
                id="title"
                placeholder="e.g., Login Website"
                required
              />
            </div>
            <div class="form-group">
              <label>Category</label>
              <select id="category" required>
                <option value="">Pilih Kategori</option>
                <option value="Web Developer">Web Developer</option>
                <option value="UI/UX Design">UI/UX Design</option>
                <option value="Graphic Design">Graphic Design</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Image URL</label>
              <input
                type="text"
                id="image"
                placeholder="e.g., Image/login page.png"
                required
              />
            </div>
            <div class="form-group">
              <label>PDF URL</label>
              <input
                type="text"
                id="pdf"
                placeholder="e.g., pdf/login-page.pdf"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label>Tanggal ( Bulan Tahun )</label>
            <input
              type="text"
              id="date"
              placeholder="e.g., Nov 2024"
              required
            />
          </div>

          <div class="btn-group">
            <button type="submit" class="btn-admin btn-primary-admin">
              + Tambah Project
            </button>
            <button
              type="button"
              class="btn-admin btn-secondary-admin"
              onclick="generateJSON()"
            >
              Generate JSON
            </button>
            <button
              type="button"
              class="btn-admin btn-secondary-admin"
              onclick="clearAll()"
            >
              Clear All
            </button>
          </div>
        </form>
      </div>

      <div class="preview-section" id="previewSection" style="display: none">
        <h3>Preview Portfolio</h3>
        <div class="portfolio-preview" id="portfolioPreview"></div>
      </div>

      <div class="json-output" id="jsonOutput" style="display: none">
        <h3>JSON Code (Copy ke portfolio.js)</h3>
        <textarea id="jsonText" readonly></textarea>
        <button
          class="btn-admin btn-primary-admin"
          onclick="copyJSON()"
          style="margin-top: 1rem"
        >
          Copy JSON
        </button>
      </div>
    </div>

    <div class="notification" id="notification">
      Project berhasil ditambahkan!
    </div>

    <script>
      // Portfolio data storage
      let portfolios = JSON.parse(localStorage.getItem("portfolios")) || [];

      // Load existing portfolios on page load
      document.addEventListener("DOMContentLoaded", () => {
        if (portfolios.length > 0) {
          renderPreview();
        }
      });

      // Form submit
      document
        .getElementById("portfolioForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();

          const newPortfolio = {
            title: document.getElementById("title").value,
            category: document.getElementById("category").value,
            image: document.getElementById("image").value,
            pdf: document.getElementById("pdf").value,
            date: document.getElementById("date").value,
          };

          portfolios.push(newPortfolio);
          localStorage.setItem("portfolios", JSON.stringify(portfolios));

          showNotification("Project berhasil ditambahkan!");
          renderPreview();
          generateJSON();
          document.getElementById("portfolioForm").reset();
        });

      // Render preview
      function renderPreview() {
        const previewSection = document.getElementById("previewSection");
        const previewContainer = document.getElementById("portfolioPreview");

        if (portfolios.length === 0) {
          previewSection.style.display = "none";
          return;
        }

        previewSection.style.display = "block";
        previewContainer.innerHTML = portfolios
          .map(
            (p, index) => `
        <div class="portfolio-item">
          <button class="delete-btn" onclick="deletePortfolio(${index})">&times;</button>
          <div class="portfolio">
            <div class="portfolio-cover">
              <img src="${p.image}" alt="${p.title}">
            </div>
            <div class="portfolio-info">
              <div class="portfolio-title">
                <h4>${p.title}</h4>
              </div>
              <div class="portfolio-tags">
                <div>${p.category}</div>
                <div>${p.date}</div>
              </div>
            </div>
          </div>
        </div>
      `,
          )
          .join("");
      }

      // Delete portfolio
      function deletePortfolio(index) {
        portfolios.splice(index, 1);
        localStorage.setItem("portfolios", JSON.stringify(portfolios));
        renderPreview();
        generateJSON();
        showNotification("Project dihapus!");
      }

      // Generate JSON
      function generateJSON() {
        const jsonOutput = document.getElementById("jsonOutput");
        const jsonText = document.getElementById("jsonText");

        if (portfolios.length === 0) {
          alert("Belum ada project! Tambahkan project terlebih dahulu.");
          return;
        }

        const jsonCode = `const portfolios = [
${portfolios
  .map(
    (p) => `  {
    title: "${p.title}",
    category: "${p.category}",
    image: "${p.image}",
    pdf: "${p.pdf}",
    date: "${p.date}"
  }`,
  )
  .join(",\n")}
];`;

        jsonText.value = jsonCode;
        jsonOutput.style.display = "block";
      }

      // Copy JSON
      function copyJSON() {
        const jsonText = document.getElementById("jsonText");
        jsonText.select();
        document.execCommand("copy");
        showNotification("JSON copied to clipboard!");
      }

      // Clear all
      function clearAll() {
        if (confirm("Yakin ingin hapus semua project?")) {
          portfolios = [];
          localStorage.setItem("portfolios", JSON.stringify(portfolios));
          renderPreview();
          document.getElementById("jsonOutput").style.display = "none";
          showNotification("Semua project dihapus!");
        }
      }

      // Show notification
      function showNotification(message) {
        const notification = document.getElementById("notification");
        notification.textContent = message;
        notification.classList.add("show");
        setTimeout(() => {
          notification.classList.remove("show");
        }, 3000);
      }
    </script>
  </body>
</html>
